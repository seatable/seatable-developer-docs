site_name: SeaTable Developer Manual
site_url: https://developer.seatable.com/
site_author: SeaTable GmbH
site_description: >-
  Developer documentation for SeaTable — client libraries for Python, JavaScript, and PHP, SQL query reference, and plugin development guide.

# Repository
repo_name: seatable/seatable-developer-docs
repo_url: https://github.com/seatable/seatable-developer-docs/

# Copyright
copyright: Copyright &copy; 2022 - 2026 SeaTable GmbH

# Configuration
theme:
  name: material
  features:
    - navigation.footer
    - navigation.tracking
    - navigation.tabs
    - navigation.sections # top-level sections are rendered as groups in the sidebar for viewports above 1220px
    - navigation.indexes # documents can be directly attached to sections
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.annotate # offer a comfortable and friendly way to attach arbitrary content to specific sections of code
  custom_dir: overrides

  # icon & favicon
  logo: media/SeaTable256-256.png
  favicon: media/seatable-favicon.ico

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

# Hooks
hooks:
  - hooks/sitemap_xsl.py

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
  - git-committers:
      repository: seatable/seatable-developer-docs
      branch: main
      enabled: !ENV ["CI", false]
      token: !ENV ["MKDOCS_GIT_COMMITTERS_APIKEY"]
  - include-markdown:
      rewrite_relative_urls: false
  - redirects:
      redirect_maps:
        # Old "Scripting" section → new language sections
        'scripts/index.md': 'index.md'
        'scripts/python/introduction.md': 'python/index.md'
        'scripts/python/objects/index.md': 'python/objects/metadata.md'
        'scripts/python/objects/metadata.md': 'python/objects/metadata.md'
        'scripts/python/objects/context.md': 'python/objects/context.md'
        'scripts/python/objects/tables.md': 'python/objects/tables.md'
        'scripts/python/objects/views.md': 'python/objects/views.md'
        'scripts/python/objects/columns.md': 'python/objects/columns.md'
        'scripts/python/objects/rows.md': 'python/objects/rows.md'
        'scripts/python/objects/links.md': 'python/objects/links.md'
        'scripts/python/objects/files.md': 'python/objects/files.md'
        'scripts/python/objects/big_data.md': 'python/objects/rows.md'
